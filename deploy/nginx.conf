# Nginx 生产配置 - LogVerse
# 前端：直接托管 dist/ 静态产物（不再反代 vite preview，生产不应用开发服务器）
# 后端：反代到 PM2 管理的 api/server.ts (port 1001)

# gzip 压缩：显著减小文本类响应体积
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

# 安全响应头（在 server 块内通过 add_header 继承）
# 注意：nginx 的 add_header 在嵌套 location 中会覆盖父级，需在每个 location 重复或使用 include

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    # 80 直接到 443，避免任何明文泄漏
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    # HSTS：强制浏览器后续走 HTTPS
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 前端静态产物根目录（vite build 输出）
    root /opt/logverse/dist;
    index index.html;

    client_max_body_size 10m;

    # 全局安全头（每个 location 默认继承，但 add_header 在 location 内会被覆盖）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # 静态资源（带 hash 的 JS/CSS/字体/图片）- 强缓存 1 年
    # vite 构建产物文件名含 contenthash，变更会自动换名，可安全长缓存
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|webp|ico|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 静态资源同样需要安全头（add_header 在 location 内会覆盖 server 级）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        try_files $uri =404;
    }

    # SPA fallback：所有未命中静态文件的请求都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 本身不缓存，确保用户总能拿到最新版本入口
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # API 反代到后端服务
    location /api/ {
        proxy_pass http://127.0.0.1:1001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 后端可能处理批量写入/查询，给足超时
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # WebSocket 反代
    location /ws {
        proxy_pass http://127.0.0.1:1001/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # WS 长连接，禁用缓冲与超时
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
